<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowan Legal Documents</title>
    <meta name="description" content="Privacy Policy and Terms of Service for Rowan by Rakita Studios.">
    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: #FAFAFA;
            color: #1A1A1A;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 72px 24px 96px;
        }

        .wordmark {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #1A1A1A;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 12px;
            color: #1A1A1A;
        }

        .lede {
            font-size: 17px;
            color: #4B5563;
            margin: 0 0 40px;
        }

        .docs {
            display: grid;
            gap: 12px;
        }

        .doc-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 24px;
            background: #FFFFFF;
            border: 1px solid #ECECEC;
            border-radius: 14px;
            color: #1A1A1A;
            text-decoration: none;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }

        .doc-link:hover {
            border-color: #1A1A1A;
            transform: translateY(-1px);
        }

        .doc-title {
            font-size: 17px;
            font-weight: 700;
        }

        .doc-sub {
            font-size: 14px;
            color: #6B7280;
            margin-top: 2px;
        }

        .doc-arrow {
            font-size: 20px;
            color: #6B7280;
            margin-left: 16px;
            flex-shrink: 0;
        }

        .doc-link:hover .doc-arrow {
            color: #1A1A1A;
        }

        .footer {
            margin-top: 56px;
            padding-top: 24px;
            border-top: 1px solid #ECECEC;
            font-size: 13px;
            color: #6B7280;
            text-align: center;
        }

        .footer a {
            color: inherit;
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .container { padding: 48px 20px 72px; }
            h1 { font-size: 28px; }
            .doc-link { padding: 18px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wordmark">Rowan</div>

        <h1>Rowan Legal Documents</h1>
        <p class="lede">Built for love. Not likes.</p>

        <div class="docs">
            <a class="doc-link" href="privacy.html">
                <div>
                    <div class="doc-title">Privacy Policy</div>
                    <div class="doc-sub">What we store, what leaves your device, what we never do</div>
                </div>
                <span class="doc-arrow">→</span>
            </a>
            <a class="doc-link" href="terms.html">
                <div>
                    <div class="doc-title">Terms of Service</div>
                    <div class="doc-sub">What Rowan is, age requirement, subscriptions, liability</div>
                </div>
                <span class="doc-arrow">→</span>
            </a>
        </div>

        <div class="footer">
            © 2026 Rakita Studios · <a href="mailto:legal@rakitastudios.com">legal@rakitastudios.com</a>
        </div>
    </div>
</body>
</html>
