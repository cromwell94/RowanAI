<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowan Legal Documents — Rakita Studios</title>
    <style>
        :root {
            --text-primary: #1B2B4B;
            --text-secondary: #4A5878;
            --text-muted: #9BA8BF;
            --accent: #E8356D;
            --border: #E8ECF3;
            --card: #F7F9FC;
            --background: #FFFFFF;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--background);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 64px 24px 96px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 32px;
        }

        .brand-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 12px;
            color: var(--text-primary);
        }

        .lede {
            font-size: 16px;
            color: var(--text-secondary);
            margin: 0 0 40px;
        }

        .docs {
            display: grid;
            gap: 12px;
        }

        .doc-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            text-decoration: none;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }

        .doc-link:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .doc-title {
            font-size: 16px;
            font-weight: 600;
        }

        .doc-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .doc-arrow {
            font-size: 18px;
            color: var(--text-muted);
        }

        .doc-link:hover .doc-arrow {
            color: var(--accent);
        }

        .footer {
            margin-top: 56px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container { padding: 40px 20px 64px; }
            h1 { font-size: 28px; }
            .doc-link { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <span class="brand-dot"></span>
            <span>Rowan</span>
        </div>

        <h1>Rowan Legal Documents</h1>
        <p class="lede">Built for love. Not likes.</p>

        <div class="docs">
            <a class="doc-link" href="privacy.html">
                <div>
                    <div class="doc-title">Privacy Policy</div>
                    <div class="doc-sub">What we store, what leaves your device, what we never do</div>
                </div>
                <span class="doc-arrow">→</span>
            </a>
            <a class="doc-link" href="terms.html">
                <div>
                    <div class="doc-title">Terms of Service</div>
                    <div class="doc-sub">What Rowan is, age requirement, subscriptions, liability</div>
                </div>
                <span class="doc-arrow">→</span>
            </a>
        </div>

        <div class="footer">
            © 2026 Rakita Studios LLC · <a href="mailto:legal@rakitastudios.com">legal@rakitastudios.com</a>
        </div>
    </div>
</body>
</html>
